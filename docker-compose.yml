services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-assistant-postgres
    environment:
      POSTGRES_DB: smart_assistant
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_user -d smart_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: smart-assistant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartadmin
      MINIO_ROOT_PASSWORD: smartpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  
  ollama:
    image: ollama/ollama:latest
    container_name: smart-assistant-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data: